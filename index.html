<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B-CAR | Auto Elétrica e Injeção Eletrônica</title>
<meta name="description" content="Cartão de visita digital B-CAR — Auto Elétrica e Injeção Eletrônica. Fale no WhatsApp, ligue ou veja nosso endereço.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0d11;
  --bg-alt:#10151b;
  --surface:#161d24;
  --border:rgba(255,255,255,0.09);
  --border-strong:rgba(255,255,255,0.16);

  --blue-700:#0b4f8a;
  --blue-500:#1e9be0;
  --blue-400:#3fc1ff;
  --blue-glow:rgba(63,193,255,0.4);

  --amber:#ffb703;
  --white:#f4f7fa;
  --muted:#8a97a3;
  --muted-2:#5c6874;

  --font-display:'Rajdhani', sans-serif;
  --font-body:'Inter', sans-serif;
  --font-mono:'JetBrains Mono', monospace;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;}
body{
  font-family:var(--font-body);
  color:var(--white);
  background:
    radial-gradient(ellipse 700px 500px at 15% 0%, rgba(30,155,224,0.16), transparent 60%),
    radial-gradient(ellipse 600px 500px at 90% 100%, rgba(11,79,138,0.18), transparent 60%),
    var(--bg);
  min-height:100vh;
  min-height:100dvh;
  height:auto;
  overflow-y:auto;
  overflow-x:hidden;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:32px 18px;
  -webkit-font-smoothing:antialiased;
}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.01ms !important;animation-iteration-count:1 !important;transition-duration:0.01ms !important;}
}

/* grid backdrop */
.bg-grid{
  position:fixed;inset:0;z-index:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size:46px 46px;
  mask-image:radial-gradient(ellipse 600px 600px at 50% 30%, black, transparent 75%);
  pointer-events:none;
}

/* ============================================
   CARD
   ============================================ */
.card{
  position:relative;z-index:1;
  width:100%;
  max-width:400px;
  background:linear-gradient(180deg,var(--surface),var(--bg-alt));
  border:1px solid var(--border);
  border-radius:22px;
  padding:38px 30px 30px;
  box-shadow:0 40px 90px -30px rgba(0,0,0,0.75), inset 0 1px 0 rgba(255,255,255,0.05);
  text-align:center;
  animation:cardIn .6s cubic-bezier(.2,.8,.2,1) both;
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(18px) scale(.98);}
  to{opacity:1;transform:translateY(0) scale(1);}
}
.card::before{
  content:'';position:absolute;inset:0;border-radius:22px;padding:1px;
  background:linear-gradient(135deg, rgba(63,193,255,0.32), transparent 45%, transparent 60%, rgba(255,183,3,0.18));
  -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite:xor; mask-composite:exclude;
  pointer-events:none;
}

/* logo mark (agora com imagem, já contém o nome e o slogan) */
.mark-stage{
  position:relative;
  width:100%;
  max-width:280px;
  margin:0 auto 4px;
  display:flex;align-items:center;justify-content:center;
}
.mark-glow{
  position:absolute;width:70%;height:70%;border-radius:50%;
  background:radial-gradient(circle, var(--blue-glow), transparent 70%);
  filter:blur(4px);
  animation:pulseGlow 2.6s ease-in-out infinite;
}
@keyframes pulseGlow{
  0%,100%{opacity:.4;transform:scale(0.92);}
  50%{opacity:.85;transform:scale(1.05);}
}
.mark-stage img{
  position:relative;z-index:1;
  width:100%;
  height:auto;
  object-fit:contain;
}

.divider{
  height:1px;
  background:linear-gradient(90deg, transparent, var(--border-strong), transparent);
  margin:22px 0 20px;
}

.pitch{
  font-size:14.5px;
  color:var(--muted);
  line-height:1.55;
  max-width:300px;
  margin:0 auto 22px;
}

/* service chips */
.chips{
  display:flex;flex-wrap:wrap;gap:8px;
  justify-content:center;
  margin-bottom:26px;
}
.chip{
  font-family:var(--font-mono);
  font-size:11px;
  letter-spacing:0.03em;
  color:var(--blue-400);
  border:1px solid rgba(63,193,255,0.3);
  background:rgba(63,193,255,0.06);
  padding:6px 12px;
  border-radius:999px;
}

/* actions */
.actions{
  display:flex;
  flex-direction:column;
  gap:11px;
}
.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  width:100%;
  padding:15px 18px;
  border-radius:14px;
  font-family:var(--font-display);
  font-weight:700;
  font-size:16px;
  letter-spacing:0.01em;
  transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
}
.btn svg{width:19px;height:19px;flex-shrink:0;}
.btn-primary{
  background:linear-gradient(135deg,#2fe38b,#1aa34a);
  color:#06210f;
  box-shadow:0 10px 26px -10px rgba(37,211,102,0.55);
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 14px 32px -10px rgba(37,211,102,0.65);}
.btn-outline{
  background:transparent;
  border:1px solid var(--border-strong);
  color:var(--white);
}
.btn-outline:hover{border-color:var(--blue-400);color:var(--blue-400);transform:translateY(-2px);}

/* row of icon-only buttons */
.icon-row{
  display:flex;
  gap:10px;
  margin-top:14px;
}
.icon-btn{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  height:48px;
  border-radius:12px;
  border:1px solid var(--border-strong);
  transition:border-color .18s ease, color .18s ease, transform .18s ease;
}
.icon-btn svg{width:19px;height:19px;}
.icon-btn:hover{border-color:var(--blue-400);color:var(--blue-400);transform:translateY(-2px);}

/* info block */
.info{
  margin-top:24px;
  padding-top:20px;
  border-top:1px solid var(--border);
  display:flex;
  flex-direction:column;
  gap:12px;
  text-align:left;
}
.info-row{
  display:flex;
  align-items:flex-start;
  gap:10px;
  font-size:13px;
  color:var(--muted);
}
.info-row svg{width:17px;height:17px;color:var(--blue-400);flex-shrink:0;margin-top:1px;}
.info-row strong{color:var(--white);font-weight:600;display:block;font-size:13px;}

.save-contact{
  margin-top:20px;
  text-align:center;
}
.save-contact a{
  font-family:var(--font-mono);
  font-size:11.5px;
  letter-spacing:0.06em;
  color:var(--muted-2);
  border-bottom:1px dashed var(--muted-2);
  padding-bottom:2px;
  transition:color .18s ease, border-color .18s ease;
}
.save-contact a:hover{color:var(--blue-400);border-color:var(--blue-400);}

footer.credit{
  margin-top:22px;
  text-align:center;
  font-size:11px;
  color:var(--muted-2);
  position:relative;z-index:1;
}

@media (max-width:400px){
  .card{padding:32px 22px 26px;}
  .brand-name{font-size:28px;}
}
</style>
</head>
